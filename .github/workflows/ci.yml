name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch cancels an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Test (with coverage gate)
        run: bun run test:coverage

      # Catches production-bundler/adapter failures that svelte-check and the
      # Vitest source transform don't — e.g. an unresolved import or a build-only
      # error that would otherwise only surface at deploy time.
      - name: Build
        run: bun run build

      # Knip and audit are informational at first — they surface dead code and
      # dependency advisories but don't fail the build until findings are triaged.
      - name: Dead-code scan (knip)
        run: bun run knip
        continue-on-error: true

      - name: Dependency audit
        run: bun audit
        continue-on-error: true
